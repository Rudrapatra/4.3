<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ANTINA SERVER | BGMI 4.4</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Video Background */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .app-container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    /* Login Card */
    .login-card {
      width: 90%;
      max-width: 480px;
      background: transparent;
      border-radius: 48px;
      padding: 2.5rem 2rem;
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: 130px;
      height: 130px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(0,0,0,0.3);
      border: 2px solid #d4af37;
      box-shadow: 0 0 30px rgba(212,175,55,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #f5e7c8, #d4af37, #f5e7c8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1.8rem;
    }

    .input-field {
      width: 100%;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.5);
      border: 1.5px solid rgba(212,175,55,0.6);
      border-radius: 60px;
      color: #f5e7c8;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }

    .input-field:focus {
      border-color: #d4af37;
      box-shadow: 0 0 20px rgba(212,175,55,0.3);
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.85rem 2rem;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(0,0,0,0.5);
      color: #d4af37;
      border: 1px solid #d4af37;
    }

    .btn-primary {
      background: rgba(212,175,55,0.2);
      color: #f5e7c8;
    }

    .btn-primary:hover, .btn:hover {
      background: rgba(212,175,55,0.4);
      transform: translateY(-2px);
    }

    .error-msg {
      margin-top: 1.2rem;
      padding: 0.7rem;
      border-radius: 40px;
      font-weight: 600;
      background: rgba(0,0,0,0.5);
      color: #ff6b4a;
    }

    /* Dashboard */
    .dashboard {
      width: 100%;
      text-align: center;
      animation: fadeInScale 0.5s ease;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .header {
      background: rgba(0,0,0,0.4);
      border-radius: 80px;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(212,175,55,0.3);
    }

    .key-status {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d4af37;
      font-weight: 600;
    }

    .timer {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f5e7c8, #d4af37);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logout-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid #d4af37;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      color: #d4af37;
      font-weight: 600;
      cursor: pointer;
    }

    .main-buttons {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .big-btn {
      padding: 1.5rem 3rem;
      font-size: 1.5rem;
      font-weight: 800;
      border-radius: 80px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #d4af37;
      color: #d4af37;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .big-btn:hover {
      transform: scale(1.05);
      background: rgba(212,175,55,0.2);
    }

    .info-text {
      margin-top: 3rem;
      color: rgba(212,175,55,0.8);
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 40px;
      display: inline-block;
      font-size: 14px;
    }

    .footer-credit {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
    }

    .footer-credit a {
      color: #d4af37;
      text-decoration: none;
      font-weight: 600;
      background: rgba(0,0,0,0.4);
      padding: 8px 20px;
      border-radius: 40px;
      display: inline-block;
    }

    /* Floating Overlay - 100% Working */
    .floating-overlay {
      position: fixed;
      z-index: 99999;
    }

    .round-mode {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 2.5px solid #d4af37;
      box-shadow: 0 0 25px rgba(212,175,55,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .round-mode:hover {
      transform: scale(1.05);
    }

    .round-mode img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .square-mode {
      width: 340px;
      height: 500px;
      border-radius: 28px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      border: 2px solid #d4af37;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .square-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid #d4af37;
      cursor: move;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,80,80,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    .close-btn:hover {
      background: #ff4444;
    }

    .video-container {
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    .overlay-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay-buttons {
      padding: 14px;
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.7);
      border-top: 1px solid #d4af37;
    }

    .overlay-btn {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #d4af37;
      color: #d4af37;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .overlay-btn:hover {
      background: rgba(212,175,55,0.3);
    }

    @media (max-width: 480px) {
      .square-mode { width: 290px; height: 440px; }
      .big-btn { padding: 1rem 2rem; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="https://ik.imagekit.io/6wmcz9oow/Hyperdrive_Space_Jump_Background_Animated_Video_Loop___Copyright-Free___Full_HD(1080p).mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div id="app" class="app-container"></div>

<script>
(function() {
    // ============ STATE ============
    let overlayActive = false;
    let overlayElement = null;
    let isExpanded = false;
    let attackActive = false;
    let attackTimer = null;
    let ipFilled = false;

    function getDeviceId() {
        let id = localStorage.getItem('antina_device_id');
        if (!id) {
            id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('antina_device_id', id);
        }
        return id;
    }

    // ============ SUPABASE API ============
    async function validateKeyWithSupabase(key, deviceId) {
        try {
            const response = await fetch('https://itnvhvamjipxtqwfuezm.supabase.co/functions/v1/validate-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: key, device_id: deviceId })
            });
            if (!response.ok) throw new Error('Server error: ' + response.status);
            const data = await response.json();
            console.log('API Response:', data);
            return data;
        } catch (error) {
            console.error('API Error:', error);
            return { valid: false, error: error.message };
        }
    }

    async function attemptLogin(key) {
        let device = getDeviceId();
        let errDiv = document.getElementById('loginError');
        let loadingDiv = document.getElementById('loadingMsg');
        if (loadingDiv) loadingDiv.style.display = 'block';
        if (errDiv) errDiv.innerText = '';
        
        try {
            let result = await validateKeyWithSupabase(key, device);
            
            if (result && result.valid === true) {
                let expiry = result.expiry || result.expires_at || result.valid_until;
                if (!expiry) {
                    if (errDiv) errDiv.innerText = 'Server error: No expiry date';
                    if (loadingDiv) loadingDiv.style.display = 'none';
                    return;
                }
                
                let expiryMs = expiry;
                if (typeof expiryMs === 'string') expiryMs = Date.parse(expiryMs);
                if (typeof expiryMs === 'number' && expiryMs < 10000000000) expiryMs = expiryMs * 1000;
                
                localStorage.setItem('antina_key', key);
                localStorage.setItem('antina_expiry', expiryMs);
                if (loadingDiv) loadingDiv.style.display = 'none';
                renderDashboard();
            } else {
                let errorMsg = 'INVALID KEY';
                if (result?.reason === 'expired') errorMsg = 'KEY EXPIRED';
                else if (result?.reason === 'max_devices') errorMsg = 'MAX DEVICE REACHED';
                else if (result?.message) errorMsg = result.message;
                if (errDiv) errDiv.innerText = errorMsg;
                if (loadingDiv) loadingDiv.style.display = 'none';
            }
        } catch (error) {
            if (errDiv) errDiv.innerText = 'Network Error';
            if (loadingDiv) loadingDiv.style.display = 'none';
        }
    }

    function logout() {
        if (overlayElement) removeOverlay();
        localStorage.removeItem('antina_key');
        localStorage.removeItem('antina_expiry');
        renderLogin();
    }

    function formatTimeRemaining(ms) {
        if (ms <= 0) return 'EXPIRED';
        let days = Math.floor(ms / (1000 * 60 * 60 * 24));
        let hours = Math.floor((ms % (86400000)) / 3600000);
        let minutes = Math.floor((ms % 3600000) / 60000);
        if (days > 0) return `${days}d ${hours}h ${minutes}m`;
        if (hours > 0) return `${hours}h ${minutes}m`;
        return `${minutes}m`;
    }

    function updateExpiry() {
        let expiry = localStorage.getItem('antina_expiry');
        let timerSpan = document.getElementById('expiryTimer');
        if (!timerSpan) return;
        if (!expiry) return;
        let remain = parseInt(expiry) - Date.now();
        if (remain <= 0) {
            timerSpan.innerText = 'EXPIRED';
            logout();
        } else {
            timerSpan.innerText = formatTimeRemaining(remain);
        }
    }

    // ============ OVERLAY - WORKING 100% ============
    function showToast(msg, color) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = color;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.zIndex = '100001';
        toast.style.fontWeight = 'bold';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function makeDraggable(element) {
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;
        
        function onStart(e) {
            let target = e.target;
            if (target.closest('.close-btn') || target.closest('.overlay-btn')) return;
            if (isExpanded && !target.closest('.square-header')) return;
            
            e.preventDefault();
            isDragging = true;
            
            let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            startX = clientX;
            startY = clientY;
            initialLeft = parseInt(element.style.left);
            initialTop = parseInt(element.style.top);
            
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }
        
        function onMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let dx = clientX - startX;
            let dy = clientY - startY;
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;
            
            let maxX = window.innerWidth - element.offsetWidth;
            let maxY = window.innerHeight - element.offsetHeight;
            newLeft = Math.max(0, Math.min(newLeft, maxX));
            newTop = Math.max(0, Math.min(newTop, maxY));
            
            element.style.left = newLeft + 'px';
            element.style.top = newTop + 'px';
        }
        
        function onEnd() {
            isDragging = false;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
        }
        
        element.addEventListener('mousedown', onStart);
        element.addEventListener('touchstart', onStart, { passive: false });
    }

    function createOverlay() {
        if (overlayElement) return;
        
        overlayElement = document.createElement('div');
        overlayElement.className = 'floating-overlay';
        overlayElement.style.position = 'fixed';
        overlayElement.style.left = '50px';
        overlayElement.style.top = '100px';
        
        overlayElement.innerHTML = `
            <div class="round-mode" id="overlayRoundMode">
                <img src="https://i.postimg.cc/YS4T2BxN/file-000000003a1c7207b41fe4bde79bcb35.png" alt="logo">
            </div>
            <div class="square-mode" id="overlaySquareMode" style="display: none;">
                <div class="square-header">
                    <span style="color:#d4af37; font-weight:600;">ANTINA OVERLAY</span>
                    <div class="close-btn" id="closeOverlayBtn">✕</div>
                </div>
                <div class="video-container">
                    <video autoplay muted loop class="overlay-video">
                        <source src="https://ik.imagekit.io/6wmcz9oow/Hyperdrive_Space_Jump_Background_Animated_Video_Loop___Copyright-Free___Full_HD(1080p).mp4" type="video/mp4">
                    </video>
                </div>
                <div class="overlay-buttons">
                    <button class="overlay-btn" id="overlayFillBtn">📡 FILL IP PORT</button>
                    <button class="overlay-btn" id="overlayStartBtn">⚡ START ATTACK</button>
                    <button class="overlay-btn" id="overlayStopBtn">⏹️ STOP ATTACK</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlayElement);
        
        let roundMode = document.getElementById('overlayRoundMode');
        let squareMode = document.getElementById('overlaySquareMode');
        let closeBtn = document.getElementById('closeOverlayBtn');
        let fillBtn = document.getElementById('overlayFillBtn');
        let startBtn = document.getElementById('overlayStartBtn');
        let stopBtn = document.getElementById('overlayStopBtn');
        
        // ROUND CLICK - EXPAND (FIXED)
        if (roundMode) {
            roundMode.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!isExpanded) {
                    roundMode.style.display = 'none';
                    squareMode.style.display = 'flex';
                    isExpanded = true;
                    showToast('Overlay Expanded', '#d4af37');
                }
            });
        }
        
        // CLOSE BUTTON - COLLAPSE (FIXED)
        if (closeBtn) {
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isExpanded) {
                    squareMode.style.display = 'none';
                    roundMode.style.display = 'flex';
                    isExpanded = false;
                    showToast('Overlay Collapsed', '#d4af37');
                }
            });
        }
        
        // FILL IP
        if (fillBtn) {
            fillBtn.addEventListener('click', function() {
                ipFilled = true;
                showToast('IP & PORT FILLED', '#4caf50');
            });
        }
        
        // START ATTACK
        if (startBtn) {
            startBtn.addEventListener('click', function() {
                if (!ipFilled) {
                    showToast('First fill IP & port', '#ff9800');
                    return;
                }
                if (attackActive) {
                    showToast('Attack already running', '#ff9800');
                    return;
                }
                attackActive = true;
                showToast('ATTACK STARTED!', '#d4af37');
                let endTime = Date.now() + 60000;
                if (attackTimer) clearInterval(attackTimer);
                attackTimer = setInterval(function() {
                    let remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    if (remaining <= 0) {
                        clearInterval(attackTimer);
                        attackActive = false;
                        showToast('ATTACK COMPLETED', '#4caf50');
                    }
                }, 1000);
            });
        }
        
        // STOP ATTACK
        if (stopBtn) {
            stopBtn.addEventListener('click', function() {
                if (attackTimer) {
                    clearInterval(attackTimer);
                    attackTimer = null;
                }
                attackActive = false;
                showToast('ATTACK STOPPED', '#ff5722');
            });
        }
        
        makeDraggable(overlayElement);
    }

    function removeOverlay() {
        if (overlayElement) {
            overlayElement.remove();
            overlayElement = null;
        }
        overlayActive = false;
        isExpanded = false;
        if (attackTimer) {
            clearInterval(attackTimer);
            attackTimer = null;
        }
        attackActive = false;
        ipFilled = false;
    }

    function startOverlay() {
        if (overlayActive) {
            showToast('Overlay already active', '#ff9800');
            return;
        }
        createOverlay();
        overlayActive = true;
        showToast('Overlay Activated! Click the logo', '#4caf50');
    }

    function stopOverlay() {
        if (!overlayActive) {
            showToast('No active overlay', '#ff9800');
            return;
        }
        removeOverlay();
        showToast('Overlay Removed', '#ff5722');
    }

    // ============ RENDER ============
    function renderDashboard() {
        let expiry = localStorage.getItem('antina_expiry');
        if (!expiry || Date.now() >= parseInt(expiry)) { logout(); return; }
        
        document.getElementById('app').innerHTML = `
            <div class="dashboard">
                <div class="header">
                    <div class="key-status"><i class="fas fa-crown"></i><span>KEY STATUS:</span><span class="timer" id="expiryTimer">--</span></div>
                    <button class="logout-btn" id="logoutDashboardBtn"><i class="fas fa-sign-out-alt"></i> EXIT</button>
                </div>
                <div class="main-buttons">
                    <button class="big-btn" id="startOverlayBtn"><i class="fas fa-play-circle"></i> START</button>
                    <button class="big-btn" id="stopOverlayBtn"><i class="fas fa-stop-circle"></i> STOP</button>
                </div>
                <div class="info-text"><i class="fas fa-info-circle"></i> START → Floating logo appears<br>✦ Click logo → Expands to panel<br>✦ Fill IP → Start/Stop Attack<br>✦ Click ✕ to collapse back</div>
                <div class="footer-credit"><a href="https://t.me/antinaseller" target="_blank"><i class="fab fa-telegram"></i> TG: @antinaseller</a></div>
            </div>
        `;
        
        updateExpiry();
        let expiryInterval = setInterval(() => { if (document.getElementById('expiryTimer')) updateExpiry(); else clearInterval(expiryInterval); }, 1000);
        
        document.getElementById('startOverlayBtn').addEventListener('click', startOverlay);
        document.getElementById('stopOverlayBtn').addEventListener('click', stopOverlay);
        document.getElementById('logoutDashboardBtn').addEventListener('click', logout);
    }

    function renderLogin() {
        if (overlayElement) removeOverlay();
        
        document.getElementById('app').innerHTML = `
            <div class="login-card">
                <div class="logo-img"><img src="https://i.postimg.cc/YS4T2BxN/file-000000003a1c7207b41fe4bde79bcb35.png" alt="ANTINA LOGO"></div>
                <div class="title">BGMI 4.4 SERVER</div>
                <input type="text" id="loginKey" class="input-field" placeholder="✧ ENTER ACCESS KEY ✧" autocomplete="off">
                <div class="btn-group">
                    <button class="btn btn-primary" id="confirmBtn">CONFIRM</button>
                    <button class="btn" id="buyKeyBtn">BUY KEY</button>
                </div>
                <div id="loadingMsg" style="display:none; margin-top:1rem; color:#d4af37;">VERIFYING...</div>
                <div id="loginError" class="error-msg"></div>
                <div class="footer-credit" style="margin-top: 2rem;"><a href="https://t.me/antinaseller" target="_blank"><i class="fab fa-telegram"></i> TG: @antinaseller</a></div>
            </div>
        `;
        
        document.getElementById('confirmBtn').addEventListener('click', () => {
            let key = document.getElementById('loginKey').value.trim();
            if (!key) { document.getElementById('loginError').innerText = 'Enter access key'; return; }
            attemptLogin(key);
        });
        document.getElementById('buyKeyBtn').addEventListener('click', () => { window.open('https://t.me/antinaseller', '_blank'); });
        document.getElementById('loginKey').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('confirmBtn').click(); });
    }

    // Auto login
    let savedKey = localStorage.getItem('antina_key');
    let savedExp = localStorage.getItem('antina_expiry');
    if (savedKey && savedExp && Date.now() < parseInt(savedExp)) { renderDashboard(); } 
    else { renderLogin(); }
})();
</script>
</body>
</html>
