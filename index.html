<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ANTINA SERVER | BGMI 4.4 ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; min-height: 100vh; background: #000; }
    
    #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
    .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.55); z-index: -1; }
    .app-container { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; padding: 20px; }

    /* Login Card */
    .login-card { width: 90%; max-width: 550px; background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(8px); border-radius: 60px; border: 1px solid rgba(212, 175, 55, 0.5); padding: 3rem 2rem; text-align: center; animation: fadeInUp 0.5s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .logo-img { width: 140px; height: 140px; margin: 0 auto 1.5rem; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2.5px solid #d4af37; box-shadow: 0 0 35px rgba(212,175,55,0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-img img { width: 100%; height: 100%; object-fit: cover; }
    .title { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; background: linear-gradient(135deg, #f5e7c8, #d4af37, #f5e7c8); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 2rem; }
    .input-field { width: 100%; padding: 1rem 1.5rem; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(212, 175, 55, 0.6); border-radius: 60px; color: #f5e7c8; font-size: 1rem; text-align: center; outline: none; }
    .input-field:focus { border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.3); }
    .btn-group { display: flex; gap: 1rem; margin-top: 2rem; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 0.9rem 2rem; border-radius: 60px; font-weight: 700; cursor: pointer; transition: all 0.25s ease; background: rgba(0,0,0,0.5); color: #d4af37; border: 1px solid #d4af37; font-size: 1rem; }
    .btn-primary { background: rgba(212, 175, 55, 0.2); color: #f5e7c8; }
    .btn-primary:hover, .btn:hover { background: rgba(212,175,55,0.4); transform: translateY(-2px); }
    .error-msg { margin-top: 1.5rem; padding: 0.8rem; border-radius: 40px; font-weight: 600; background: rgba(0,0,0,0.5); color: #ff6b4a; font-size: 0.9rem; }

    /* Dashboard */
    .dashboard { width: 100%; max-width: 1200px; margin: 0 auto; text-align: center; animation: fadeInScale 0.5s ease; }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .header { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 80px; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 2.5rem; border: 1px solid rgba(212,175,55,0.4); }
    .key-status { display: flex; align-items: center; gap: 12px; color: #d4af37; font-weight: 600; font-size: 1rem; }
    .timer { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #f5e7c8, #d4af37); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logout-btn { background: rgba(0,0,0,0.5); border: 1px solid #d4af37; padding: 0.6rem 1.5rem; border-radius: 40px; color: #d4af37; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .logout-btn:hover { background: rgba(212,175,55,0.2); }
    .main-buttons { display: flex; gap: 2rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
    .big-btn { padding: 1.5rem 3rem; font-size: 1.5rem; font-weight: 800; border-radius: 80px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 2px solid #d4af37; color: #d4af37; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; }
    .big-btn:hover { transform: scale(1.03); background: rgba(212,175,55,0.2); }
    .info-text { margin-top: 3rem; color: rgba(212,175,55,0.85); background: rgba(0,0,0,0.3); padding: 1rem 1.5rem; border-radius: 50px; display: inline-block; font-size: 0.85rem; }
    .footer-credit { text-align: center; margin-top: 3rem; padding: 1rem; }
    .footer-credit a { color: #d4af37; text-decoration: none; font-weight: 600; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 40px; display: inline-block; font-size: 0.85rem; }

    /* ========= FLOATING OVERLAY - CORNER ME ========= */
    .floating-overlay {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
    }

    .round-mode {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0,0,0,0.8);
      border: 2.5px solid #d4af37;
      box-shadow: 0 0 20px rgba(212,175,55,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .round-mode:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(212,175,55,0.8); }
    .round-mode img { width: 100%; height: 100%; object-fit: cover; }

    .square-mode {
      width: 380px;
      height: 560px;
      border-radius: 28px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border: 2px solid #d4af37;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .square-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid #d4af37;
    }
    .close-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,80,80,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
    .close-btn:hover { background: #ff4444; transform: scale(1.05); }

    .video-container { flex: 1; background: #000; overflow: hidden; position: relative; }
    .overlay-video { width: 100%; height: 100%; object-fit: cover; }

    /* Video Ke UPAR Transparent Buttons + Slider */
    .video-overlay-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-row { display: flex; gap: 8px; justify-content: center; }
    .vid-btn { flex: 1; padding: 8px; border-radius: 40px; background: rgba(0,0,0,0.7); border: 1px solid #d4af37; color: #d4af37; font-weight: 700; cursor: pointer; font-size: 11px; text-align: center; transition: 0.2s; }
    .vid-btn:hover { background: rgba(212,175,55,0.3); }
    .vid-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .slider-row { display: flex; gap: 10px; align-items: center; }
    .slider-row span { color: #d4af37; font-size: 11px; font-weight: 600; min-width: 45px; }
    input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; background: #4a2e1a; border-radius: 5px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #d4af37; border-radius: 50%; cursor: pointer; }

    /* Attack History inside Overlay */
    .history-container {
      max-height: 120px;
      overflow-y: auto;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid #d4af37;
      padding: 8px;
    }
    .history-item {
      font-size: 10px;
      color: #d4af37;
      padding: 4px;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      display: flex;
      justify-content: space-between;
    }

    .overlay-footer {
      text-align: center;
      padding: 8px;
      border-top: 1px solid rgba(212,175,55,0.3);
      font-size: 10px;
    }
    .overlay-footer a { color: #d4af37; text-decoration: none; }

    @media (max-width: 480px) {
      .square-mode { width: 340px; height: 520px; }
      .big-btn { padding: 1rem 2rem; font-size: 1.2rem; }
      .title { font-size: 1.8rem; }
      .login-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="https://ik.imagekit.io/6wmcz9oow/Hyperdrive_Space_Jump_Background_Animated_Video_Loop___Copyright-Free___Full_HD(1080p).mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div id="app" class="app-container"></div>

<script>
(function() {
    let overlayActive = false;
    let overlayElement = null;
    let isExpanded = false;
    let attackActive = false;
    let attackTimer = null;
    let ipFilled = false;
    let selectedSeconds = 60;
    let attackHistory = [];

    function getDeviceId() {
        let id = localStorage.getItem('antina_device_id');
        if (!id) {
            id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('antina_device_id', id);
        }
        return id;
    }

    async function validateKey(key, deviceId) {
        try {
            let res = await fetch('https://itnvhvamjipxtqwfuezm.supabase.co/functions/v1/validate-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: key, device_id: deviceId })
            });
            return await res.json();
        } catch(e) {
            return { valid: false };
        }
    }

    async function attemptLogin(key) {
        let device = getDeviceId();
        let errDiv = document.getElementById('loginError');
        let loadingDiv = document.getElementById('loadingMsg');
        if (loadingDiv) loadingDiv.style.display = 'block';
        
        let result = await validateKey(key, device);
        
        if (result && result.valid === true) {
            let expiry = result.expiry || result.expires_at;
            if (!expiry) {
                if (errDiv) errDiv.innerText = 'Server error';
                if (loadingDiv) loadingDiv.style.display = 'none';
                return;
            }
            let expiryMs = typeof expiry === 'string' ? Date.parse(expiry) : expiry;
            if (typeof expiryMs === 'number' && expiryMs < 1e10) expiryMs *= 1000;
            
            localStorage.setItem('antina_key', key);
            localStorage.setItem('antina_expiry', expiryMs);
            renderDashboard();
        } else {
            let msg = '❌ INVALID KEY';
            if (result?.reason === 'expired') msg = '⌛ KEY EXPIRED';
            else if (result?.reason === 'max_devices') msg = '⚠️ MAX DEVICE REACHED';
            if (errDiv) errDiv.innerText = msg;
        }
        if (loadingDiv) loadingDiv.style.display = 'none';
    }

    function logout() {
        if (overlayElement) removeOverlay();
        localStorage.removeItem('antina_key');
        localStorage.removeItem('antina_expiry');
        renderLogin();
    }

    function formatTime(ms) {
        if (ms <= 0) return 'EXPIRED';
        let days = Math.floor(ms / (86400000));
        let hours = Math.floor((ms % 86400000) / 3600000);
        let mins = Math.floor((ms % 3600000) / 60000);
        if (days > 0) return `${days}d ${hours}h ${mins}m`;
        if (hours > 0) return `${hours}h ${mins}m`;
        return `${mins}m`;
    }

    function updateExpiry() {
        let expiry = localStorage.getItem('antina_expiry');
        let timerSpan = document.getElementById('expiryTimer');
        if (!timerSpan) return;
        if (!expiry) return;
        let remain = parseInt(expiry) - Date.now();
        if (remain <= 0) {
            timerSpan.innerText = 'EXPIRED';
            logout();
        } else {
            timerSpan.innerText = formatTime(remain);
        }
    }

    function showToast(msg, color) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = color;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.zIndex = '100001';
        toast.style.fontWeight = 'bold';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function addToHistory(duration, status) {
        attackHistory.unshift({ duration, status, time: new Date().toLocaleTimeString() });
        if (attackHistory.length > 5) attackHistory.pop();
        updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
        let historyDiv = document.getElementById('attackHistoryList');
        if (!historyDiv) return;
        if (attackHistory.length === 0) {
            historyDiv.innerHTML = '<div style="text-align:center; color:#888; padding:5px;">No attacks</div>';
            return;
        }
        historyDiv.innerHTML = attackHistory.map(h => `<div class="history-item"><span>⚡ ${h.duration}s</span><span>${h.status}</span><span>${h.time}</span></div>`).join('');
    }

    // Overlay Create
    function createOverlay() {
        if (overlayElement) return;
        
        overlayElement = document.createElement('div');
        overlayElement.className = 'floating-overlay';
        overlayElement.innerHTML = `
            <div class="round-mode" id="overlayRoundMode">
                <img src="https://i.postimg.cc/YS4T2BxN/file-000000003a1c7207b41fe4bde79bcb35.png" alt="logo">
            </div>
            <div class="square-mode" id="overlaySquareMode" style="display: none;">
                <div class="square-header">
                    <span style="color:#d4af37; font-weight:600;"><i class="fas fa-crown"></i> ANTINA OVERLAY</span>
                    <div class="close-btn" id="closeOverlayBtn">✕</div>
                </div>
                <div class="video-container">
                    <video autoplay muted loop class="overlay-video">
                        <source src="https://ik.imagekit.io/6wmcz9oow/Hyperdrive_Space_Jump_Background_Animated_Video_Loop___Copyright-Free___Full_HD(1080p).mp4" type="video/mp4">
                    </video>
                    <div class="video-overlay-controls">
                        <div class="btn-row">
                            <div class="vid-btn" id="overlayFillBtn">📡 FILL IP PORT</div>
                            <div class="vid-btn" id="overlayStartBtn">⚡ START ATTACK</div>
                            <div class="vid-btn" id="overlayStopBtn">⏹️ STOP ATTACK</div>
                        </div>
                        <div class="slider-row">
                            <span>⚡ DURATION</span>
                            <input type="range" id="attackSlider" min="10" max="500" value="60">
                            <span id="sliderValue" style="min-width:50px;">60s</span>
                        </div>
                    </div>
                </div>
                <div class="history-container">
                    <div style="font-size:10px; color:#d4af37; padding:4px; border-bottom:1px solid #d4af37;">⚔️ ATTACK HISTORY</div>
                    <div id="attackHistoryList" style="max-height:100px; overflow-y:auto;">No attacks</div>
                </div>
                <div class="overlay-footer">
                    <a href="https://t.me/antinaseller" target="_blank"><i class="fab fa-telegram"></i> @antinaseller</a>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlayElement);
        
        let roundMode = document.getElementById('overlayRoundMode');
        let squareMode = document.getElementById('overlaySquareMode');
        let closeBtn = document.getElementById('closeOverlayBtn');
        let fillBtn = document.getElementById('overlayFillBtn');
        let startBtn = document.getElementById('overlayStartBtn');
        let stopBtn = document.getElementById('overlayStopBtn');
        let slider = document.getElementById('attackSlider');
        let sliderVal = document.getElementById('sliderValue');
        
        if (roundMode) {
            roundMode.onclick = () => {
                if (!isExpanded) {
                    roundMode.style.display = 'none';
                    squareMode.style.display = 'flex';
                    isExpanded = true;
                }
            };
        }
        
        if (closeBtn) {
            closeBtn.onclick = () => {
                if (isExpanded) {
                    squareMode.style.display = 'none';
                    roundMode.style.display = 'flex';
                    isExpanded = false;
                }
            };
        }
        
        if (slider) {
            slider.oninput = (e) => {
                selectedSeconds = parseInt(e.target.value);
                sliderVal.innerText = selectedSeconds + 's';
            };
        }
        
        // Fill IP Port - Mandatory
        if (fillBtn) {
            fillBtn.onclick = () => {
                ipFilled = true;
                showToast('✓ IP & PORT FILLED', '#4caf50');
                fillBtn.style.background = 'rgba(76,175,80,0.3)';
            };
        }
        
        // Start Attack - Only if IP Filled
        if (startBtn) {
            startBtn.onclick = () => {
                if (!ipFilled) {
                    showToast('⚠️ First click FILL IP PORT', '#ff9800');
                    return;
                }
                if (attackActive) {
                    showToast('⚠️ Attack already running', '#ff9800');
                    return;
                }
                attackActive = true;
                addToHistory(selectedSeconds, '🔥 Running');
                showToast(`⚡ ATTACK STARTED (${selectedSeconds}s)`, '#d4af37');
                let endTime = Date.now() + (selectedSeconds * 1000);
                if (attackTimer) clearInterval(attackTimer);
                attackTimer = setInterval(() => {
                    let remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    if (remaining <= 0) {
                        clearInterval(attackTimer);
                        attackActive = false;
                        addToHistory(selectedSeconds, '✅ Completed');
                        showToast('✅ ATTACK COMPLETED', '#4caf50');
                        // Update history status
                        let historyDiv = document.getElementById('attackHistoryList');
                        if (historyDiv && historyDiv.firstChild) {
                            // refresh
                            updateHistoryDisplay();
                        }
                    }
                }, 1000);
            };
        }
        
        // Stop Attack - Only if Attack Started
        if (stopBtn) {
            stopBtn.onclick = () => {
                if (!attackActive) {
                    showToast('⚠️ No active attack to stop', '#ff9800');
                    return;
                }
                if (attackTimer) {
                    clearInterval(attackTimer);
                    attackTimer = null;
                }
                attackActive = false;
                addToHistory(selectedSeconds, '⏹️ Stopped');
                showToast('⏹️ ATTACK STOPPED', '#ff5722');
                updateHistoryDisplay();
            };
        }
        
        updateHistoryDisplay();
    }
    
    function removeOverlay() {
        if (overlayElement) {
            overlayElement.remove();
            overlayElement = null;
        }
        overlayActive = false;
        isExpanded = false;
        if (attackTimer) { clearInterval(attackTimer); attackTimer = null; }
        attackActive = false;
        ipFilled = false;
    }
    
    function startOverlay() {
        if (overlayActive) { showToast('Overlay already active', '#ff9800'); return; }
        createOverlay();
        overlayActive = true;
        showToast('✅ Overlay Activated! Click the round logo', '#4caf50');
    }
    
    function stopOverlay() {
        if (!overlayActive) { showToast('No active overlay', '#ff9800'); return; }
        removeOverlay();
        showToast('⏹️ Overlay Removed', '#ff5722');
    }

    function renderDashboard() {
        let expiry = localStorage.getItem('antina_expiry');
        if (!expiry || Date.now() >= parseInt(expiry)) { logout(); return; }
        
        document.getElementById('app').innerHTML = `
            <div class="dashboard">
                <div class="header">
                    <div class="key-status"><i class="fas fa-crown"></i> KEY STATUS: <span class="timer" id="expiryTimer">--</span></div>
                    <button class="logout-btn" id="logoutDashboardBtn"><i class="fas fa-sign-out-alt"></i> EXIT</button>
                </div>
                <div class="main-buttons">
                    <button class="big-btn" id="startOverlayBtn"><i class="fas fa-play-circle"></i> START</button>
                    <button class="big-btn" id="stopOverlayBtn"><i class="fas fa-stop-circle"></i> STOP</button>
                </div>
                <div class="info-text"><i class="fas fa-info-circle"></i> START → Round logo appears (bottom-right)<br>✦ Click logo → Open control panel<br>✦ Fill IP PORT → Start Attack → Stop Attack<br>✦ History shows inside panel</div>
                <div class="footer-credit"><a href="https://t.me/antinaseller" target="_blank"><i class="fab fa-telegram"></i> TG: @antinaseller</a></div>
            </div>
        `;
        
        updateExpiry();
        let expiryInterval = setInterval(() => { if (document.getElementById('expiryTimer')) updateExpiry(); else clearInterval(expiryInterval); }, 1000);
        
        document.getElementById('startOverlayBtn').onclick = startOverlay;
        document.getElementById('stopOverlayBtn').onclick = stopOverlay;
        document.getElementById('logoutDashboardBtn').onclick = logout;
    }

    function renderLogin() {
        if (overlayElement) removeOverlay();
        
        document.getElementById('app').innerHTML = `
            <div class="login-card">
                <div class="logo-img"><img src="https://i.postimg.cc/YS4T2BxN/file-000000003a1c7207b41fe4bde79bcb35.png" alt="ANTINA LOGO"></div>
                <div class="title">BGMI 4.4 SERVER</div>
                <input type="text" id="loginKey" class="input-field" placeholder="✧ ENTER ACCESS KEY ✧" autocomplete="off">
                <div class="btn-group">
                    <button class="btn btn-primary" id="confirmBtn">CONFIRM</button>
                    <button class="btn" id="buyKeyBtn">BUY KEY</button>
                </div>
                <div id="loadingMsg" style="display:none; margin-top:1rem; color:#d4af37;">🔐 VERIFYING...</div>
                <div id="loginError" class="error-msg"></div>
                <div class="footer-credit" style="margin-top: 2rem;"><a href="https://t.me/antinaseller" target="_blank"><i class="fab fa-telegram"></i> TG: @antinaseller</a></div>
            </div>
        `;
        
        document.getElementById('confirmBtn').onclick = () => {
            let key = document.getElementById('loginKey').value.trim();
            if (!key) { document.getElementById('loginError').innerText = '⚠️ Enter access key'; return; }
            attemptLogin(key);
        };
        document.getElementById('buyKeyBtn').onclick = () => { window.open('https://t.me/antinaseller', '_blank'); };
        document.getElementById('loginKey').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('confirmBtn').click(); };
    }

    let savedKey = localStorage.getItem('antina_key');
    let savedExp = localStorage.getItem('antina_expiry');
    if (savedKey && savedExp && Date.now() < parseInt(savedExp)) { renderDashboard(); } 
    else { renderLogin(); }
})();
</script>
</body>
</html>
